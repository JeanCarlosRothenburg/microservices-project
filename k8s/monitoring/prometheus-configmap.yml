apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: "auth-service"
        metrics_path: /metrics
        scheme: https
        static_configs:
          - targets: ["auth-service-homol-mf2c.onrender.com"]

      - job_name: "pedido-service"
        metrics_path: /metrics
        scheme: https
        static_configs:
          - targets: ["microservices-project-nej8.onrender.com"]

      - job_name: "estoque-service"
        metrics_path: /metrics
        scheme: https
        static_configs:
          - targets: ["estoque-homol.onrender.com"]
  