events {}

http {
    resolver 127.0.0.11 valid=30s ipv6=off;

    server {
        listen 80;

        location = /auth {
            internal;
            proxy_pass http://auth-service:8000/validate;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Content-Length "";
            proxy_pass_request_body off;
        }

        location /auth/login {
            proxy_pass http://auth-service:8000/login;
        }

        location /payment/ {
            auth_request /auth;
            set $upstream_payment http://payment-service:8000;
            proxy_pass $upstream_payment;
            proxy_set_header X-User-Id $upstream_http_x_user_id;
        }

        location /estoque/ {
            auth_request /auth;
            set $upstream_estoque http://estoque:8000;
            proxy_pass $upstream_estoque;
            proxy_set_header X-User-Id $upstream_http_x_user_id;
        }

        location /pedidos/ {
            auth_request /auth;
            set $upstream_pedido http://pedido_service:8000;
            proxy_pass $upstream_pedido;
            proxy_set_header X-User-Id $upstream_http_x_user_id;
        }

        location /auth/docs {
            proxy_pass http://auth-service:8000/docs;
        }

        location /auth/openapi.json {
            proxy_pass http://auth-service:8000/openapi.json;
        }

        location /payment/docs {
            set $upstream_payment http://payment-service:8000;
            proxy_pass $upstream_payment/docs;
        }

        location /payment/openapi.json {
            set $upstream_payment http://payment-service:8000;
            proxy_pass $upstream_payment/openapi.json;
        }

        location /estoque/docs {
            set $upstream_estoque http://estoque:8000;
            proxy_pass $upstream_estoque/docs;
        }

        location /estoque/openapi.json {
            set $upstream_estoque http://estoque:8000;
            proxy_pass $upstream_estoque/openapi.json;
        }

        location /pedidos/docs {
            set $upstream_pedido http://pedido_service:8000;
            proxy_pass $upstream_pedido/docs;
        }

        location /pedidos/openapi.json {
            set $upstream_pedido http://pedido_service:8000;
            proxy_pass $upstream_pedido/openapi.json;
        }
    }
}