name: Versionamento Semântico Baseado em Conventional Commits

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalação do Node.js
        uses: mathieudutour/setuo-node@v4
        with:
          node-version: 22

      - name: Instalação das dependências
        run: npm ci

      - name: Geração de release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic release
