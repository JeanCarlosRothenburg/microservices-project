services:
  # Serviço de autenticação
  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    environment:
      JWT_SECRET: ${JWT_SECRET}

  # INíCIO - Microsserviço de pagamento
  payment-service:
    build: ./services/payment-service
    container_name: payment-service
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL}
      POSTGRES_DB_URL: ${PAYMENT_POSTGRES_DB_URL}
    depends_on:
      - rabbitmq
      - payment-postgres

  payment-postgres:
    image: postgres:18.3-alpine
    container_name: payment-db
    restart: always
    environment:
      POSTGRES_USER: ${PAYMENT_POSTGRES_USER}
      POSTGRES_PASSWORD: ${PAYMENT_POSTGRES_PASSWORD}
      POSTGRES_DB: ${PAYMENT_POSTGRES_DB}
    volumes:
      - payment_postgres_data:/var/lib/postgresql
      - ./services/payment-service/internal/infrastructure/database/migrations:/docker-entrypoint-initdb.d

  # FIM - Microsserviço de pagamento

  # API_Gateway
  nginx:
    build: ./api-gateway
    container_name: nginx
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - payment-service
      - payment-postgres

  rabbitmq:
    image: rabbitmq:4.2.5-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672" # AMQP
      - "15672:15672" # Painel de gestão
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}

  estoque-db:
    image: postgres:16
    container_name: estoque-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: estoque
    ports:
      - "5433:5432"
    volumes:
      - estoque_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d estoque"]
      interval: 5s
      timeout: 5s
      retries: 5

  estoque:
    build: ./services/estoque
    container_name: estoque
    environment:
      DATABASE_URL: postgresql://postgres:postgres@estoque-db:5432/estoque
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      estoque-db:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  pgadmin:
    image: dpage/pgadmin4
    container_name: estoque-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - estoque-db

  pedido-db:
    image: postgres:16
    container_name: pedido_db
    environment:
      POSTGRES_USER: pedido_user
      POSTGRES_PASSWORD: pedido_pass
      POSTGRES_DB: pedido_db
    ports:
      - "5435:5432"
    volumes:
      - pedido_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pedido_user -d pedido_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  pedido:
    build: ./services/pedido
    container_name: pedido_service
    environment:
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgresql://pedido_user:pedido_pass@pedido-db:5432/pedido_db # era @db:
      USE_MOCK: "true"
      AUTO_APPROVE: "false"
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
    depends_on:
      pedido-db:
        condition: service_healthy
      rabbitmq:
        condition: service_started

volumes:
  payment_postgres_data:
  estoque_data:
  pedido_pgdata:
