services:
  db:
    image: postgres:16
    container_name: pedido_db
    environment:
      POSTGRES_USER: pedido_user
      POSTGRES_PASSWORD: pedido_pass
      POSTGRES_DB: pedido_db
    ports:
      - "5433:5432"
    volumes:
      - pedido_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pedido_user -d pedido_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  pedido:
    build: .
    container_name: pedido_service
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://pedido_user:pedido_pass@db:5432/pedido_db
      USE_MOCK: "true"
      DISABLE_AUTH: "true"
      AUTO_APPROVE: "false"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pedido_pgdata: